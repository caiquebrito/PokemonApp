# Detekt configuration — layered on top of the default rule set
# (buildUponDefaultConfig = true). Only deviations from the defaults live here.
build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  LongParameterList:
    active: true
    # ViewModels / use cases commonly take a few injected collaborators.
    functionThreshold: 7
    constructorThreshold: 8
    # Compose screen content hoists all state/callbacks as parameters.
    ignoreAnnotated: ['Composable']
  LongMethod:
    active: true
    threshold: 60
    # Compose UI builders are declarative and legitimately long.
    ignoreAnnotated: ['Composable', 'Preview']
  TooManyFunctions:
    active: true
    thresholdInClasses: 15
    thresholdInObjects: 15

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
    ignoreAnnotated: ['Composable', 'Preview']
    ignorePropertyDeclaration: true
  ReturnCount:
    active: true
    max: 3
  UnusedPrivateMember:
    active: true
    ignoreAnnotated: ['Preview']
  MaxLineLength:
    active: true
    maxLineLength: 140

naming:
  active: true
  FunctionNaming:
    active: true
    # Jetpack Compose @Composable functions are intentionally PascalCase.
    ignoreAnnotated: ['Composable']
  PackageNaming:
    # ':data-remote' maps to package com.ctb.data_remote (Gradle modules can't use '-').
    active: false

# Note: formatting (ktlint) is intentionally NOT configured here — Spotless owns
# formatting as the single source of truth (./gradlew spotlessCheck / spotlessApply).
