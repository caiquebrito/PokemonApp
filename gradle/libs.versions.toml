# MockK
mockK = { module = "io.mockk:mockk", version.ref = "mockK" }
mockK-agent-jvm = { module = "io.mockk:mockk-agent-jvm", version.ref = "mockK" }
mockK-android = { module = "io.mockk:mockk-android", version.ref = "mockK" }

# Retrofit
retrofit = { module = "com.squareup.retrofit2:retrofit", version.ref = "retrofit" }
retrofit-adapterRxjava2 = { module = "com.squareup.retrofit2:adapter-rxjava2", version.ref = "retrofit" }
retrofit-gsonConverter = { module = "com.squareup.retrofit2:converter-gson", version.ref = "retrofit" }
